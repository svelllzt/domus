{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<section class="auth-wrap">
    <h1>Регистрация</h1>
    {% if error %}<p class="alert error">{{ error }}</p>{% endif %}
    <form method="post" action="/auth/register" class="card">
        <input type="text" name="name" placeholder="Ваше имя" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Пароль" minlength="8" required>
        <label>Роль:</label>
        <select name="role">
            <option value="user">Пользователь</option>
            <option value="shelter_staff">Представитель приюта</option>
        </select>
        <button class="btn btn--primary" type="submit">Создать аккаунт</button>
    </form>
</section>
{% endblock %}
