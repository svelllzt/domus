{% extends "base.html" %}
{% block title %}Восстановление пароля{% endblock %}
{% block content %}
<section class="auth-wrap">
    <h1>Восстановление пароля</h1>
    {% if error %}<p class="alert error">{{ error }}</p>{% endif %}
    {% if success %}<p class="alert success">{{ success }}</p>{% endif %}
    {% if token %}
        <form method="post" action="/auth/reset-password" class="card">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="password" name="password" minlength="8" placeholder="Новый пароль" required>
            <button class="btn btn--primary" type="submit">Сменить пароль</button>
        </form>
    {% else %}
        <form method="post" action="/auth/restore-password" class="card">
            <input type="email" name="email" placeholder="Email" required>
            <button class="btn btn--primary" type="submit">Отправить ссылку</button>
        </form>
    {% endif %}
</section>
{% endblock %}
